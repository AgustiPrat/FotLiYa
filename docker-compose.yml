services:
  api:
    build: "api"
    container_name: apifly
    ports:
      - "8000:8000"
    restart: unless-stopped
    networks:
      - app-network
  web:
    build: "djangoweb"
    container_name: djangoweb
    ports:
      - "8080:8080"
    restart: unless-stopped
    depends_on:
      - api
    environment:
      - API_URL=http://api:8000
    volumes:
      - db:/djangoweb/db.sqlite3
    networks:
      - app-network

volumes:
  db:
networks:
  app-network:
