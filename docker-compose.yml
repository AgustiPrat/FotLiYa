services:
  api:
    build: "api"
    container_name: apifly
    ports:
      - "8000:8000"
    restart: unless-stopped
  web:
    build: "djangoweb"
    container_name: djangoweb
    ports:
      - "8080:8080"
    restart: unless-stopped
    depends_on:
      - api
    volumes:
      - db:/djangoweb/db.sqlite3

volumes:
  db:
